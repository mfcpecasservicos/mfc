<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Painel Gestor — Refrigeração</title>
<style>
:root{
  --bg:#0a0d14;--surface:#111827;--surface2:#1c2333;--surface3:#242f45;
  --accent:#3b82f6;--accent2:#06b6d4;--text:#f1f5f9;--muted:#64748b;
  --border:#1e2d45;--green:#22c55e;--yellow:#f59e0b;--orange:#f97316;
  --red:#ef4444;--purple:#a855f7;--radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4)
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:15px}
/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
header h1{font-size:1rem;font-weight:600;flex:1}
#conn{font-size:.78rem;color:var(--muted)}
/* Main layout */
.main{max-width:1140px;margin:0 auto;padding:24px 20px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
/* Form grid */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.fl{font-size:.72rem;color:var(--muted);margin-bottom:4px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:.9rem;outline:none;font-family:inherit;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
textarea.fi{resize:vertical;min-height:52px}
/* Buttons */
.btn{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:.85rem;font-weight:600;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn:hover{opacity:.85}
.btn-blue{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-orange{background:var(--orange);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-muted{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-gold{background:#78350f;color:#fcd34d;border:1px solid #92400e}
.btn-cyan{background:#0e7490;color:#fff}
.btn-sm{padding:5px 10px;font-size:.78rem}
.acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;width:fit-content;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:.83rem;color:var(--muted);border:none;background:none;transition:all .18s;white-space:nowrap}
.tab.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tab.has-badge{position:relative}
.tab-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center}
/* Search */
.search-row{position:relative;margin-bottom:14px}
.search-row input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px 9px 36px;color:var(--text);font-size:.9rem;outline:none}
.search-row input:focus{border-color:var(--accent)}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
/* Client cards */
.clist{display:flex;flex-direction:column;gap:10px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .15s}
.cc:hover{border-color:var(--accent)}
.cc-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cmeta{flex:1;min-width:0}
.cmeta strong{font-size:.93rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cmeta .csub{color:var(--muted);font-size:.78
