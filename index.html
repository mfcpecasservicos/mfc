const app=initializeApp({apiKey:"AIzaSyAUUid850sbmBAVS9JzeZ94SbC-qzkk0B8",authDomain:"roteiro-mfc-d3053.firebaseapp.com",projectId:"roteiro-mfc-d3053",storageBucket:"roteiro-mfc-d3053.firebasestorage.app",messagingSenderId:"1030114859934",appId:"1:1030114859934:web:ad353eafb55205d6b4148f"});
const db=getFirestore(app);const col=collection(db,'clients');let allClients=[],currentId=null,currentLayerIdx=0,localPhotos={},knownIds=null,currentDetailClient=null;
function captureDetailDraft(){
  const state={forms:{}};
  if(!document.getElementById('detail')?.classList.contains('open'))return state;
  document.querySelectorAll('[id^="f-model-"]').forEach(el=>{const i=el.id.replace('f-model-','');state.forms[i]=state.forms[i]||{};state.forms[i].model=el.value||'';});
  document.querySelectorAll('[id^="f-problem-"]').forEach(el=>{const i=el.id.replace('f-problem-','');state.forms[i]=state.forms[i]||{};state.forms[i].problem=el.value||'';});
  document.querySelectorAll('[id^="f-pickup-"]').forEach(el=>{const i=el.id.replace('f-pickup-','');state.forms[i]=state.forms[i]||{};state.forms[i].pickup=!!el.checked;});
  document.querySelectorAll('[data-service-type]').forEach(el=>{if(!el.classList.contains('active'))return;const i=el.dataset.serviceType;state.forms[i]=state.forms[i]||{};state.forms[i].serviceType=Array.from(document.querySelectorAll(`[data-service-type="${i}"].active`)).map(el=>el.dataset.value).join(', ');});
  return state;
}
function restoreDetailDraft(state){
  Object.entries(state?.forms||{}).forEach(([i,d])=>{
    const model=document.getElementById('f-model-'+i),problem=document.getElementById('f-problem-'+i),pickup=document.getElementById('f-pickup-'+i);
    if(model&&d.model!==undefined)model.value=d.model;

  });
}try{if(!history.state||!history.state.mfcApp)history.replaceState({mfcApp:true,mfcList:true},'')}catch(e){}
const STATUS={waiting:'Aguardando visita',workshop_pending:'Aguardando Avaliação',evaluated:'Avaliação concluída',quoted:'Orçamento enviado',approved:'Aprovado',ready_delivery:'Equipamento pronto para entrega',service_finished:'Serviço finalizado',absent:'Cliente ausente',done:'Concluído'};
const ICON={waiting:'🕐',workshop_pending:'🏭',evaluated:'✅',quoted:'💰',approved:'🟠',ready_delivery:'📦',service_finished:'✅',absent:'🚫',done:'✔'};
const SERVICE_TYPES=['🔧 Corretiva','🧽 Preventiva','🧰 Instalação','📋 Laudo'];
function serviceTypeLabel(value){
  const v=String(value||'').trim();
  if(!v)return '';
  if(v.includes('Preventiva'))return '🧽 Preventiva';
  if(v.includes('Corretiva'))return '🔧 Corretiva';
  if(v.includes('Instala'))return '🧰 Instalação';
  return v;
}
function inferServiceType(text){
  const t=String(text||'');
  if(t.includes('Preventiva'))return '🧽 Preventiva';
  if(t.includes('Corretiva'))return '🔧 Corretiva';
  if(t.includes('Instala'))return '🧰 Instalação';

function reportText(i){return (document.getElementById('f-problem-'+i)?.value||'').trim()}
function serviceText(i){return reportText(i)}
window.submitReport=async(id,i)=>{if(id!==currentId)return alert('Abra este cliente novamente antes de enviar.');const c=allClients.find(x=>x.id===id);if(!c)return alert('Cliente não encontrado. Atualize a tela e tente novamente.');const layers=[...getLayers(c)];if(!layers[i])return alert('Relatório não encontrado. Atualize a tela e tente novamente.');const model=(document.getElementById('f-model-'+i)?.value||'').trim(),selected=selectedServiceTypes(i),serviceType=selected.join(', ')||'',obs=reportText(i),problem=serviceText(i);if(!model)return alert('Preencha o modelo exato do equipamento.');if(!selected.length)return alert('Selecione ao menos um tipo de serviço.');if(!obs)return alert('Preencha o relatório do serviço.');const needsPickup=serviceInWorkshop(layers[i])?false:(document.getElementById('f-pickup-'+i)?.checked||false);try{const photos=await normalizedPhotosForSave(i);const updatedAt=new Date().toISOString();layers[i]={...layers[i],techReport:{model,serviceType,problem,photos,needsPickup},needsPickup,status:'evaluated',updatedAt};const first=layers.find(l=>!l.done);const updated={...c,layers,status:first?.status||'evaluated',updatedAt};await updateDoc(doc(db,'clients',id),{layers,status:updated.status,updatedAt});setClientForEdit(updated);closeEditReportModal();alert('✅ Avaliação enviada com sucesso!');const nextIndex=layers.findIndex((l,idx)=>idx!==i&&!l.done&&!hasSubmittedReport(l)&&(st(l.status)==='waiting'||st(l.status)==='workshop_pending'));if(nextIndex>=0){currentLayerIdx=nextIndex;renderDetailFull(updated);setTimeout(()=>switchTab(id,nextIndex),0)}else{closeDetail()}}catch(e){console.error(e);alert('A avaliação não foi enviada. Nada foi apagado. Verifique a internet e tente novamente. Se tiver muitas fotos, remova algumas e envie outra vez.')}};

window.addVisit=async id=>{try{const draft=captureDetailDraft();const c=await getFreshClientForEdit(id);if(!c)return alert('Cliente não encontrado. Atualize a tela e tente novamente.');const layers=Array.isArray(c.layers)&&c.layers.length?[...c.layers]:[...getLayers(c)];const modelBase=(draft.forms?.[0]?.model||layers[0]?.techReport?.model||'').trim();layers.push({status:'waiting',quote:'',quoteObs:'',techReport:modelBase?{model:modelBase,serviceType:'',problem:'',photos:[],needsPickup:false}:null,approval:null,done:false,createdAt:new Date().toISOString()});const c2={...c,layers,status:(layers.find(l=>!l.done)?.status||c.status||'waiting'),updatedAt:new Date().toISOString()};setClientForEdit(c2);currentLayerIdx=layers.length-1;renderDetailFull(c2,true);await updateDoc(doc(db,'clients',id),{layers,status:c2.status,updatedAt:c2.updatedAt})}catch(e){console.error(e);alert('Não foi possível adicionar o relatório. Atualize a tela e tente novamente.')}};
window.deleteReport=async(id,i)=>{try{const c=await getFreshClientForEdit(id);if(!c)return alert('Cliente não encontrado. Atualize a tela e tente novamente.');const layers=Array.isArray(c.layers)&&c.layers.length?[...c.layers]:[...getLayers(c)];if(layers.length<=1)return alert('É necessário manter pelo menos 1 relatório.');if(!layers[i])return alert('Relatório não encontrado. Atualize a tela e tente novamente.');if(!confirm('Excluir este relatório?'))return;layers.splice(i,1);if(currentLayerIdx>=layers.length)currentLayerIdx=layers.length-1;if(currentLayerIdx<0)currentLayerIdx=0;const first=layers.find(l=>!l.done);const c2={...c,layers,status:first?.status||(layers.every(l=>l.done)?'done':(layers[0]?.status||'waiting')),updatedAt:new Date().toISOString()};setClientForEdit(c2);renderDetailFull(c2);await updateDoc(doc(db,'clients',id),{layers,status:c2.status,updatedAt:c2.updatedAt})}catch(e){console.error(e);alert('Não foi possível excluir o relatório. Atualize a tela e tente novamente.')}};

window.markReadyDelivery=async(id,i)=>{const c=allClients.find(x=>x.id===id),layers=[...getLayers(c)];layers[i]={...layers[i],status:'ready_delivery',readyDeliveryAt:new Date().toISOString()};await updateDoc(doc(db,'clients',id),{layers,status:'ready_delivery'})};
window.markServiceFinished=async(id,i)=>{if(!confirm('Confirmar serviço concluído?'))return;const c=allClients.find(x=>x.id===id),layers=[...getLayers(c)];layers[i]={...layers[i],status:'service_finished',serviceFinishedAt:new Date().toISOString()};await updateDoc(doc(db,'clients',id),{layers,status:'service_finished',updatedAt:new Date().toISOString()})};
window.discardClient=async id=>{if(!confirm('Descartar para lixeira?'))return;await updateDoc(doc(db,'clients',id),{deleted:true,deletedAt:new Date().toISOString()});closeDetail()};
</script>
<script>
let deferredInstallPrompt=null;const installBtn=document.getElementById('install-btn');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;if(installBtn)installBtn.style.display='inline-block'});
installBtn?.addEventListener('click',async()=>{if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();await deferredInstallPrompt.userChoice.catch(()=>null);deferredInstallPrompt=null;installBtn.style.display='none'});
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js',{scope:'./'}).then(r=>r.update()).catch(()=>null));
</script>
</body>
