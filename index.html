<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MFC</title><meta name="theme-color" content="#0d1117"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"><style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--accent:#58a6ff;--text:#e6edf3;--muted:#8b949e;--border:#30363d;--green:#3fb950;--yellow:#d29922;--orange:#db6d28;--red:#f85149;--purple:#bc8cff;--cyan:#38bdf8;--radius:12px}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;max-width:480px;margin:0 auto}#offline-banner{background:#7c3aed;color:#fff;text-align:center;padding:8px;font-size:.8rem;display:none}header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}header h1{font-size:1rem;font-weight:800;flex:1}.reload-btn,.install-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 9px;font-size:.75rem;cursor:pointer}.install-btn{display:none;background:var(--accent);color:#fff}.search-wrap{padding:12px 16px 0;position:relative}.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px 10px 36px;color:var(--text)}.search-icon{position:absolute;left:28px;top:52%;color:var(--muted)}.list-wrap{padding:12px 16px;display:flex;flex-direction:column;gap:10px}.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);border-left-width:4px;cursor:pointer}.card.s-waiting{border-left-color:#3b82f6}.card.s-workshop_pending{border-left-color:#38bdf8}.card.s-evaluated{border-left-color:#22c55e}.card.s-quoted{border-left-color:#eab308}.card.s-approved{border-left-color:#f97316}.card.s-ready_delivery{border-left-color:#38bdf8}.card.s-absent{border-left-color:#a855f7}.card.s-done{border-left-color:#22c55e;opacity:.7}.card-inner{padding:14px 16px;display:flex;align-items:center;gap:12px}.card-icon{font-size:1.5rem}.card-info{flex:1;min-width:0}.card-name{font-weight:800;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card-sub{font-size:.76rem;color:var(--muted)}.card-dt{font-size:.76rem;font-weight:800;color:#fff;background:#1e3a5f;border:1px solid #3b82f6;border-radius:6px;padding:3px 8px;display:inline-block;margin-top:4px}.badge{font-size:.66rem;font-weight:900;padding:4px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap}.b-waiting{background:#0d2346;color:#60a5fa}.b-workshop_pending{background:#083344;color:#67e8f9}.b-evaluated{background:#0d2e1b;color:#86efac}.b-quoted{background:#2d1e00;color:#fcd34d}.b-approved{background:#2d1200;color:#fb923c}.b-ready_delivery{background:#0c4a6e;color:#7dd3fc}.b-absent{background:#2d1a4a;color:#d8b4fe}.b-done{background:#0d2e1b;color:#4ade80}.empty{text-align:center;padding:60px 20px;color:var(--muted)}#detail{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;max-width:480px;margin:0 auto;overflow-y:auto}#detail.open{display:flex}.detail-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}.back-btn{background:none;border:none;color:var(--accent);font-size:1rem;padding:6px}.detail-header h2{flex:1;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.detail-body{padding:16px;display:flex;flex-direction:column;gap:12px}.box{background:var(--surface);border-radius:var(--radius);padding:14px;border:1px solid var(--border)}.box h3{font-size:.76rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}.irow{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}.irow label{font-size:.72rem;color:var(--muted)}.irow span{font-size:.9rem}.maps-link{color:var(--accent);font-size:.82rem;text-decoration:none;padding:7px 12px;background:#0d2346;border-radius:8px;display:inline-block}.v-tabs-wrap{display:flex;gap:6px;flex-wrap:wrap}.v-tab{padding:7px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.8rem}.v-tab.active{color:#fff;font-weight:800}.v-panel{display:none}.v-panel.active{display:flex;flex-direction:column;gap:10px}.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}.fg label{font-size:.8rem;color:var(--muted);font-weight:700}.fg input,.fg textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:.9rem;width:100%;font-family:inherit}.fg textarea{resize:vertical;min-height:80px}.photo-area{background:var(--surface2);border-radius:10px;padding:12px}.photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.photo-thumb{position:relative;width:72px;height:72px}.photo-thumb img,.photo-row img{width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:pointer}.photo-del{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:0;border-radius:50%;width:21px;height:21px;font-weight:900}.photo-btns{display:flex;gap:8px}.photo-btn{flex:1;padding:10px;border-radius:8px;border:1px dashed var(--border);background:var(--bg);color:var(--muted);font-size:.85rem;text-align:center}.submit-btn,.done-btn,.absent-btn{color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:.95rem;font-weight:800;cursor:pointer;width:100%}.submit-btn,.done-btn{background:var(--green)}.absent-btn{background:var(--purple)}.trash-btn{background:var(--red);color:#fff;border:none;border-radius:var(--radius);padding:12px;font-weight:800}.waiting-msg{padding:14px;text-align:center;color:var(--muted);background:var(--surface);border-radius:var(--radius)}.doc-box{background:#0f172a;border:1px solid #334155;border-radius:var(--radius);padding:12px}.budget-preview{width:100%;max-height:260px;object-fit:contain;border-radius:10px;border:1px solid var(--border);background:#020617;cursor:pointer;margin-top:8px}.indicator{display:inline-block;font-size:.78rem;font-weight:800;padding:6px 9px;border-radius:12px;background:#083344;color:#67e8f9;border:1px solid #0e7490;margin-top:6px}.company-banner{background:linear-gradient(135deg,#0e7490,#1e3a5f);border-radius:var(--radius);padding:14px;border:1px solid #67e8f955}.edit-box{border:1px dashed var(--border);padding:12px;border-radius:10px;background:var(--surface2)}
</style></head><body><div id="offline-banner">📵 Sem conexão — modo offline.</div><header><span>❄️</span><h1>MFC</h1><span id="conn">🔴</span><button class="install-btn" id="install-btn">⬇</button><button class="reload-btn" onclick="location.reload()">🔄</button></header><div class="search-wrap"><span class="search-icon">🔍</span><input id="search-input" placeholder="Buscar cliente..." oninput="renderList()"></div><div class="list-wrap" id="list-wrap"><div class="empty">⏳ Carregando...</div></div><div id="detail"><div class="detail-header"><button class="back-btn" onclick="closeDetail()">←</button><h2 id="d-name"></h2><span class="badge" id="d-badge"></span></div><div class="detail-body" id="d-body"></div></div><input type="file" id="input-gallery" accept="image/*" multiple style="display:none" onchange="handleFiles(this)"><input type="file" id="input-camera" accept="image/*" capture="environment" style="display:none" onchange="handleFiles(this)">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";import { getFirestore, collection, onSnapshot, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const app=initializeApp({
  apiKey:"AIzaSyAUUid850sbmBAVS9JzeZ94SbC-qzkk0B8",
  authDomain:"roteiro-mfc-d3053.firebaseapp.com",
  projectId:"roteiro-mfc-d3053",
  storageBucket:"roteiro-mfc-d3053.firebasestorage.app",
  messagingSenderId:"1030114859934",
  appId:"1:1030114859934:web:ad353eafb55205d6b4148f"
});const db=getFirestore(app);const col=collection(db,'clients');let allClients=[],currentId=null,currentLayerIdx=0,localPhotos={},knownIds=null;
const STATUS={waiting:'Aguardando visita',workshop_pending:'Aguardando Avaliação',evaluated:'Avaliação concluída',quoted:'Orçamento enviado',approved:'Aprovado',ready_delivery:'Equipamento pronto para entrega',absent:'Cliente ausente',done:'Concluído'};const ICON={waiting:'🕐',workshop_pending:'🏭',evaluated:'✅',quoted:'💰',approved:'🟠',ready_delivery:'📦',absent:'🚫',done:'✔'};const st=s=>String(s||'waiting').toLowerCase().trim();const lbl=s=>STATUS[st(s)]||STATUS.waiting;const icon=s=>ICON[st(s)]||'📋';const fdt=dt=>{if(!dt)return'—';try{return new Date(dt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}catch{return dt}};const maps=a=>'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(a||'');function getLayers(c){return c.layers&&c.layers.length?c.layers:[{status:c.status||'waiting',techReport:c.techReport||null,approval:c.approval||null,done:c.status==='done',createdAt:c.createdAt}]}function activeLayer(c){return getLayers(c).find(l=>!l.done)||getLayers(c)[0]}function getStatus(c){return c.status||activeLayer(c)?.status||'waiting'}function serviceInWorkshop(l){return !!(l?.serviceInWorkshop||l?.approval?.serviceInWorkshop)}
function updOnline(){document.getElementById('offline-banner').style.display=navigator.onLine?'none':'block'}window.addEventListener('online',updOnline);window.addEventListener('offline',updOnline);updOnline();
window.openLb=src=>{if(src)window.open(src,'_blank')};const q=query(col,orderBy('createdAt','asc'));onSnapshot(q,snap=>{allClients=snap.docs.map(d=>({id:d.id,...d.data()}));document.getElementById('conn').textContent='🟢';renderList();if(currentId){const c=allClients.find(x=>x.id===currentId);if(c)renderDetailFull(c)}},()=>document.getElementById('conn').textContent='🔴');
window.renderList=()=>{const wrap=document.getElementById('list-wrap'),search=document.getElementById('search-input').value.toLowerCase().trim();let clients=allClients.filter(c=>!c.deleted).filter(c=>getLayers(c).some(l=>!l.done));if(search)clients=clients.filter(c=>(c.name||'').toLowerCase().includes(search)||(c.phone||'').includes(search));if(!clients.length){wrap.innerHTML='<div class="empty">📋 Sem clientes.</div>';return}wrap.innerHTML=clients.map(c=>{const s=st(getStatus(c)),l=activeLayer(c);return`<div class="card s-${s}" onclick="openDetail('${c.id}')"><div class="card-inner"><div class="card-icon">${icon(s)}</div><div class="card-info"><div class="card-name">${c.name||'—'}</div><div class="card-sub">${c.address||'—'}</div>${l?.techReport?.needsPickup?'<span class="indicator">🏭 Retirar equipamento</span>':''}${serviceInWorkshop(l)?'<span class="indicator">🏭 Serviço no galpão</span>':''}<div class="card-dt">📅 ${fdt(l?.approval?.serviceDate||c.datetime)}</div></div><span class="badge b-${s}">${lbl(s)}</span></div></div>`}).join('')};
window.openDetail=id=>{currentId=id;localPhotos={};const c=allClients.find(x=>x.id===id);if(!c)return;const layers=getLayers(c);currentLayerIdx=Math.max(0,layers.findIndex(l=>!l.done));document.getElementById('d-name').textContent=c.name||'Cliente';document.getElementById('detail').classList.add('open');renderDetailFull(c)};window.closeDetail=()=>{document.getElementById('detail').classList.remove('open');currentId=null;localPhotos={}};
function renderDetailFull(c){const layers=getLayers(c);document.getElementById('d-badge').textContent=lbl(getStatus(c));document.getElementById('d-badge').className='badge b-'+st(getStatus(c));let html=`<div class="box"><h3>📋 Informações</h3><div class="irow"><label>Telefone</label><span>${c.phone||'—'}</span></div><div class="irow"><label>Equipamento</label><span>${c.equip||'—'}</span></div>${c.address?`<a class="maps-link" href="${maps(c.address)}" target="_blank">📍 Abrir no Maps</a>`:''}</div>`;let activeN=0;html+=`<div class="v-tabs-wrap">${layers.map((l,i)=>l.done?'':`<button class="v-tab ${i===currentLayerIdx?'active':''}" data-vtab="${c.id}" onclick="switchTab('${c.id}',${i})">${icon(l.status)} Visita ${++activeN}</button>`).join('')}</div>`;activeN=0;html+=layers.map((l,i)=>{if(l.done)return'';const s=st(l.status),active=i===currentLayerIdx;let panel='';if(s==='waiting'||s==='workshop_pending')panel=assessmentForm(c,l,i);else panel=statusPanel(c,l,i);return`<div class="v-panel ${active?'active':''}" id="vp-${c.id}-${i}" data-vpanel="${c.id}">${panel}</div>`}).join('');document.getElementById('d-body').innerHTML=html;Object.keys(localPhotos).forEach(i=>refreshPhotos(parseInt(i)))}
function assessmentForm(c,l,i){localPhotos[i]=[...(l.techReport?.photos||[])];return`<div class="box"><h3>🔧 Avaliação técnica</h3><div class="fg"><label>Modelo do equipamento</label><input id="f-model-${i}" value="${l.techReport?.model||''}" placeholder="Ex: LG 12.000 BTU"></div><div class="fg"><label>Serviços a realizar</label><textarea id="f-problem-${i}" placeholder="Descreva os serviços...">${l.techReport?.problem||''}</textarea></div><label style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><input type="checkbox" id="f-pickup-${i}" ${l.techReport?.needsPickup||l.needsPickup?'checked':''}>Precisa retirar o equipamento</label><div class="photo-area"><div class="photo-row" id="photo-row-${i}"></div><div class="photo-btns"><div class="photo-btn" onclick="openCamera(${i})">📷 Câmera</div><div class="photo-btn" onclick="openGallery(${i})">🖼️ Galeria</div></div></div><button class="submit-btn" onclick="submitReport('${c.id}',${i})">✅ Enviar avaliação</button></div><button class="absent-btn" onclick="markAbsent('${c.id}',${i})">🚫 Cliente ausente</button><button class="trash-btn" onclick="discardClient('${c.id}')">🗑 Descartar para lixeira</button>`}
function editAssessment(c,l,i){localPhotos[i]=[...(l.techReport?.photos||[])];return`<div class="edit-box"><h3>✏️ Editar avaliação</h3><div class="fg"><label>Modelo do equipamento</label><input id="f-model-${i}" value="${l.techReport?.model||''}"></div><div class="fg"><label>Serviços</label><textarea id="f-problem-${i}">${l.techReport?.problem||''}</textarea></div><label style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><input type="checkbox" id="f-pickup-${i}" ${l.techReport?.needsPickup||l.needsPickup?'checked':''}>Precisa retirar o equipamento</label><div class="photo-area"><div class="photo-row" id="photo-row-${i}"></div><div class="photo-btns"><div class="photo-btn" onclick="openCamera(${i})">📷 Câmera</div><div class="photo-btn" onclick="openGallery(${i})">🖼️ Galeria</div></div></div><button class="submit-btn" onclick="submitReport('${c.id}',${i})">💾 Atualizar avaliação</button></div>`}
function statusPanel(c,l,i){const photos=l.techReport?.photos||[];const s=st(l.status);let doc=l.budgetImage?.data?`<div class="doc-box"><h3>🖼️ Imagem do orçamento</h3><img class="budget-preview" src="${l.budgetImage.data}" onclick="openLb('${l.budgetImage.data}')"></div>`:'';let ready=s==='approved';return`${l.techReport?`<div class="box"><h3>🔧 Avaliação enviada</h3><div class="irow"><label>Equipamento</label><span>${l.techReport.model||'—'}</span></div><div class="irow"><label>Serviços</label><span>${l.techReport.problem||'—'}</span></div>${l.techReport.needsPickup?'<span class="indicator">🏭 Retirar equipamento</span>':''}<div class="photo-row">${photos.map(p=>`<img src="${p}" onclick="openLb('${p}')">`).join('')}</div></div>`:''}${editAssessment(c,l,i)}${l.quote?`<div class="box"><h3>💰 Orçamento</h3><p>${l.quote}</p>${l.quoteObs?`<p style="color:var(--muted);margin-top:6px">${l.quoteObs}</p>`:''}</div>`:''}${doc}${l.approval?.payment?`<div class="box"><h3>🟠 Aprovado</h3><p>Pagamento: <b>${l.approval.payment}</b>${l.approval.value?' — <b>'+l.approval.value+'</b>':''}</p><p>📅 ${fdt(l.approval.serviceDate)}</p>${serviceInWorkshop(l)?'<span class="indicator">🏭 Serviço no galpão</span>':''}</div>`:''}${st(l.status)==='approved'?(serviceInWorkshop(l)?`<button class="done-btn" onclick="markReadyDelivery('${c.id}',${i})">📦 Pronto para Entrega</button>`:`<button class="done-btn" onclick="markDone('${c.id}',${i})">✅ Serviço Concluído</button>`):''}${st(l.status)==='ready_delivery'?'<div class="waiting-msg">📦 Equipamento pronto para entrega. Aguardando conclusão do gestor.</div>':''}<button class="trash-btn" onclick="discardClient('${c.id}')">🗑 Descartar para lixeira</button>`}
window.switchTab=(cid,i)=>{currentLayerIdx=i;document.querySelectorAll(`[data-vtab="${cid}"]`).forEach(t=>t.classList.remove('active'));document.querySelectorAll(`[data-vpanel="${cid}"]`).forEach(p=>p.classList.remove('active'));document.querySelectorAll(`[data-vtab="${cid}"]`)[i]?.classList.add('active');document.getElementById(`vp-${cid}-${i}`)?.classList.add('active')};
let pendingLayerIdx=0;window.openCamera=i=>{pendingLayerIdx=i;document.getElementById('input-camera').click()};window.openGallery=i=>{pendingLayerIdx=i;document.getElementById('input-gallery').click()};window.handleFiles=input=>{const i=pendingLayerIdx;if(!localPhotos[i])localPhotos[i]=[];Array.from(input.files).forEach(file=>{const r=new FileReader();r.onload=e=>{localPhotos[i].push(e.target.result);refreshPhotos(i)};r.readAsDataURL(file)});input.value=''};function refreshPhotos(i){const el=document.getElementById('photo-row-'+i);if(!el)return;el.innerHTML=(localPhotos[i]||[]).map((p,k)=>`<div class="photo-thumb"><img src="${p}" onclick="openLb('${p}')"><button class="photo-del" onclick="removePhoto(${i},${k})">✕</button></div>`).join('')}window.removePhoto=(i,k)=>{localPhotos[i].splice(k,1);refreshPhotos(i)};
window.submitReport=async(id,i)=>{const c=allClients.find(x=>x.id===id),layers=[...getLayers(c)];const model=document.getElementById('f-model-'+i)?.value.trim(),problem=document.getElementById('f-problem-'+i)?.value.trim();if(!model||!problem)return alert('Preencha modelo e serviços.');const needsPickup=document.getElementById('f-pickup-'+i)?.checked||false;layers[i]={...layers[i],techReport:{model,problem,photos:[...(localPhotos[i]||[])],needsPickup},needsPickup,status:'evaluated'};const first=layers.find(l=>!l.done);await updateDoc(doc(db,'clients',id),{layers,status:first?.status||'evaluated',updatedAt:new Date().toISOString()})};
window.markAbsent=async(id,i)=>{if(!confirm('Confirmar cliente ausente?'))return;const c=allClients.find(x=>x.id===id),layers=[...getLayers(c)];layers[i]={...layers[i],status:'absent',absentAt:new Date().toISOString()};await updateDoc(doc(db,'clients',id),{layers,status:'absent'})};window.markReadyDelivery=async(id,i)=>{const c=allClients.find(x=>x.id===id),layers=[...getLayers(c)];layers[i]={...layers[i],status:'ready_delivery',readyDeliveryAt:new Date().toISOString()};await updateDoc(doc(db,'clients',id),{layers,status:'ready_delivery'})};window.markDone=async(id,i)=>{if(!confirm('Confirmar serviço concluído?'))return;const c=allClients.find(x=>x.id===id),layers=[...getLayers(c)];layers[i]={...layers[i],status:'done',done:true,concludedAt:new Date().toISOString()};const first=layers.find(l=>!l.done);await updateDoc(doc(db,'clients',id),{layers,status:first?.status||'done',completedAt:first?c.completedAt:new Date().toISOString()});if(!first)closeDetail()};window.discardClient=async id=>{if(!confirm('Descartar para lixeira?'))return;await updateDoc(doc(db,'clients',id),{deleted:true,deletedAt:new Date().toISOString()});closeDetail()};
</script><script>let deferredInstallPrompt=null;const installBtn=document.getElementById('install-btn');window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;if(installBtn)installBtn.style.display='inline-block'});installBtn?.addEventListener('click',async()=>{if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();await deferredInstallPrompt.userChoice.catch(()=>null);deferredInstallPrompt=null;installBtn.style.display='none'});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js',{scope:'./'}).then(r=>r.update()).catch(()=>null));</script></body></html>
