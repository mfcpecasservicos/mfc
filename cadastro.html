<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cadastro MFC</title><style>
:root{--bg:#f3f6fb;--surface:#fff;--text:#0f172a;--muted:#64748b;--accent:#2563eb;--border:#e2e8f0;--radius:18px}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}.wrap{max-width:760px;margin:0 auto}.hero{background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 10px 34px #0001;border:1px solid var(--border);margin-bottom:18px}.hero-cover{width:100%;height:210px;object-fit:cover;display:block}.hero-content{text-align:center;padding:24px}.hero-logo{width:110px;margin:-78px auto 12px;display:block;background:#fff;border-radius:22px;padding:8px;box-shadow:0 10px 28px #0002}.hero h1{font-size:2rem}.hero p{color:var(--muted);margin-top:8px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:0 4px 18px #0000000a}.fg{margin-bottom:14px}.fg label{display:block;font-weight:700;font-size:.9rem;margin-bottom:6px}.fg input,.fg textarea{width:100%;border:1px solid var(--border);border-radius:14px;padding:15px;font-size:1rem;outline:none;font-family:inherit}.fg input:focus,.fg textarea:focus{border-color:var(--accent)}.fg textarea{min-height:110px;resize:vertical}.btn{width:100%;border:0;border-radius:16px;background:var(--accent);color:#fff;font-weight:800;font-size:1rem;padding:16px;cursor:pointer}.btn:disabled{opacity:.6}.msg{display:none;margin-top:16px;border-radius:14px;padding:14px;text-align:center;font-weight:700}.success{background:#dcfce7;color:#166534}.error{display:block;background:#fee2e2;color:#991b1b}.footer{margin:18px auto;text-align:center;color:#0f172a;background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;font-weight:800}@media(max-width:600px){body{padding:12px}.hero-cover{height:160px}.hero h1{font-size:1.55rem}.hero-logo{width:92px;margin-top:-58px}.card{padding:16px}}
</style></head><body><div class="wrap"><div class="hero"><img class="hero-cover" src="mfc-capa.png"><div class="hero-content"><img class="hero-logo" src="mfc-logo.png"><h1>Cadastro</h1><p>Preencha essas informações para darmos continuidade no agendamento da sua visita técnica.</p></div></div><div id="blocked" class="card" style="display:none"><div class="msg error">Este link de cadastro expirou. Solicite um novo atendimento.</div></div><form class="card" id="form"><div class="fg"><label>Nome completo *</label><input id="name" required></div><div class="fg"><label>Número de contato *</label><input id="phone" required placeholder="71 9 0000-0000" oninput="phoneMask(this)"></div><div class="fg"><label>E-mail</label><input id="email" type="email"></div><div class="fg"><label>Cidade/localização *</label><input id="city" required></div><div class="fg"><label>Endereço *</label><input id="address" required></div><div class="fg"><label>Número da residência *</label><input id="number" required></div><div class="fg"><label>Bairro *</label><input id="neighborhood" required></div><div class="fg"><label>Ponto de referência *</label><input id="ref" required></div><div class="fg"><label>Equipamento *</label><input id="equip" required placeholder="Equipamento, marca, BTUs ou KG"></div><div class="fg"><label>Descrição do problema *</label><textarea id="problem" required></textarea></div><button class="btn" id="submit" type="submit">Finalizar cadastro</button><div id="msg" class="msg success">Cadastro finalizado!</div></form><div class="footer">30 anos atendendo em Dias D'Ávila e região</div></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
const app=initializeApp({
  apiKey:"AIzaSyAUUid850sbmBAVS9JzeZ94SbC-qzkk0B8",
  authDomain:"roteiro-mfc-d3053.firebaseapp.com",
  projectId:"roteiro-mfc-d3053",
  storageBucket:"roteiro-mfc-d3053.firebasestorage.app",
  messagingSenderId:"1030114859934",
  appId:"1:1030114859934:web:ad353eafb55205d6b4148f"
});const db=getFirestore(app);const leadsCol=collection(db,'leads');const clientsCol=collection(db,'clients');const tokenCol=collection(db,'cadastroTokens');let tokenOk=false,token='';
function normPhone(v){let n=String(v||'').replace(/\D/g,'');if(n.length===8)n='71'+n;if(n.length===9)n='71'+n;if(n.startsWith('55')&&n.length>11)n=n.slice(2);return n}function titleCase(s){return String(s||'').toLowerCase().replace(/([a-záàâãéèêíïóôõöúçñ])/g,m=>m.toUpperCase()).replace(/\s+/g,' ').trim()}window.phoneMask=el=>{let v=el.value.replace(/\D/g,'');if(v.length>11)v=v.slice(0,11);if(v.length<=2)el.value=v;else if(v.length<=7)el.value=v.slice(0,2)+' '+v.slice(2);else if(v.length<=10)el.value=v.slice(0,2)+' '+v.slice(2,6)+'-'+v.slice(6);else el.value=v.slice(0,2)+' '+v.slice(2,3)+' '+v.slice(3,7)+'-'+v.slice(7)};
async function validateToken(){token=new URLSearchParams(location.search).get('token')||'';if(!token)return block();const ref=doc(db,'cadastroTokens',token);const snap=await getDoc(ref).catch(()=>null);if(!snap||!snap.exists())return block();const data=snap.data();const age=Date.now()-new Date(data.createdAt||0).getTime();if(data.used||age>24*60*60*1000)return block();tokenOk=true}function block(){document.getElementById('form').style.display='none';document.getElementById('blocked').style.display='block'}
async function findExisting(phoneNorm){const snap=await getDocs(clientsCol);let found=null;snap.forEach(d=>{const c=d.data();const p=c.phoneNorm||normPhone(c.phone);if(p&&p===phoneNorm)found={id:d.id,...c}});return found}
function newLayer(){return {status:'waiting',quote:'',quoteObs:'',techReport:null,approval:null,done:false,createdAt:new Date().toISOString()}}
document.getElementById('form').addEventListener('submit',async e=>{e.preventDefault();if(!tokenOk)return block();const btn=document.getElementById('submit');btn.disabled=true;const phone=document.getElementById('phone').value.trim();const phoneNorm=normPhone(phone);const data={name:titleCase(document.getElementById('name').value),phone,phoneNorm,email:document.getElementById('email').value.trim().toLowerCase(),city:titleCase(document.getElementById('city').value),address:titleCase(document.getElementById('address').value),number:document.getElementById('number').value.trim(),neighborhood:titleCase(document.getElementById('neighborhood').value),ref:titleCase(document.getElementById('ref').value),equip:document.getElementById('equip').value.trim(),problem:document.getElementById('problem').value.trim(),createdAt:new Date().toISOString()};try{const ex=await findExisting(phoneNorm);if(ex){const layers=[...(ex.layers||[]),newLayer()];await updateDoc(doc(db,'clients',ex.id),{deleted:false,recurrent:true,phoneNorm,layers,status:'waiting',notes:data.problem,datetime:'',updatedAt:new Date().toISOString()})}else{await addDoc(leadsCol,data)}await updateDoc(doc(db,'cadastroTokens',token),{used:true,usedAt:new Date().toISOString(),phoneNorm});document.getElementById('msg').style.display='block';setTimeout(()=>location.href='https://wa.me/5571981122167?text=Cadastro%20finalizado!%20Em%20breve%20entraremos%20em%20contato.',900)}catch(err){console.error(err);alert('Erro ao finalizar cadastro. Tente novamente.');btn.disabled=false}});validateToken().catch(block);
</script></body></html>
